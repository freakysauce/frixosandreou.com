<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Cabinet Grotesk';src:url('../assets/fonts/CabinetGrotesk-Variable.woff2') format('woff2');font-weight:100 900}
@font-face{font-family:'Spline Sans Mono';src:url('../assets/fonts/SplineSansMono-Regular.woff2') format('woff2');font-weight:400}
*{margin:0;box-sizing:border-box}
body{width:1584px;height:396px;background:#F6F5F1;color:#141414;overflow:hidden;
  background-image:linear-gradient(#DEDBD3 1px,transparent 1px),linear-gradient(90deg,#DEDBD3 1px,transparent 1px);
  background-size:66px 66px;background-position:center top}
.frame{position:fixed;inset:12px;border:1.5px solid #141414}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:38px}
.mark{width:210px;flex:none}
h1{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;text-transform:uppercase;font-size:64px;line-height:.92;letter-spacing:-.01em;white-space:nowrap}
h1 .outline{color:transparent;-webkit-text-stroke:1.3px #141414}
.tag{margin-top:14px;font-family:'Spline Sans Mono',monospace;font-size:15px;letter-spacing:.3em;
  border-top:1.5px solid #141414;border-bottom:1.5px solid #141414;padding:9px 2px;display:inline-block;white-space:nowrap}
svg.con{position:absolute;top:0;height:396px;opacity:.5}
.note{position:absolute;font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.2em;color:#A6A29A}
</style></head>
<body>
<div class="frame"></div>
<svg class="con" style="left:-140px" width="480" viewBox="0 0 480 396" fill="none" stroke="#A6A29A">
  <circle cx="200" cy="198" r="150" stroke-dasharray="3 6" stroke-width="1"/>
  <circle cx="200" cy="198" r="92.7" stroke-dasharray="3 6" stroke-width="1"/>
  <circle cx="200" cy="198" r="57.3" stroke-dasharray="3 6" stroke-width="1"/>
  <line x1="40" y1="198" x2="360" y2="198" stroke-width="1" stroke-dasharray="10 6 2 6"/>
</svg>
<svg class="con" style="right:-140px" width="480" viewBox="0 0 480 396" fill="none" stroke="#A6A29A">
  <circle cx="280" cy="198" r="150" stroke-dasharray="3 6" stroke-width="1"/>
  <circle cx="280" cy="198" r="92.7" stroke-dasharray="3 6" stroke-width="1"/>
  <circle cx="280" cy="198" r="57.3" stroke-dasharray="3 6" stroke-width="1"/>
  <line x1="120" y1="198" x2="440" y2="198" stroke-width="1" stroke-dasharray="10 6 2 6"/>
</svg>
<p class="note" style="left:52px;bottom:30px">r = r₀·φ^(−2θ/π)</p>
<p class="note" style="right:52px;bottom:30px;text-align:right">CPH · 55.676° N</p>
<div class="center">
  <div class="mark" id="m"></div>
  <div>
    <h1>Frixos <span class="outline">Andreou</span></h1>
    <p class="tag">FORWARD DEPLOYED ENGINEER</p>
  </div>
</div>
<script>
var PHI=(1+Math.sqrt(5))/2,B=Math.log(PHI)/(Math.PI/2),D2R=Math.PI/180;
var H={cx:332,cy:252,rRoot:140,startAngle:-102,sweepTurns:1.18,wRoot:34,wTip:1.5,taperPow:1.4,widthCap:.52};
function rib(m){var o=[],n=[],S=110;for(var i=0;i<=S;i++){var t=i/S,th=H.sweepTurns*2*Math.PI*t,
r=H.rRoot*Math.exp(-B*th),a=H.startAngle*D2R+th,x=H.cx+r*Math.cos(a),y=H.cy+r*Math.sin(a);
if(m)x=512-x;var w=Math.min(H.wRoot+(H.wTip-H.wRoot)*Math.pow(t,H.taperPow),H.widthCap*r),
s=m?-1:1,nx=Math.cos(a)*s,ny=Math.sin(a);o.push([x+nx*w,y+ny*w]);n.push([x-nx*w,y-ny*w]);}
return 'M'+o.concat(n.reverse()).map(function(p){return p[0].toFixed(1)+' '+p[1].toFixed(1)}).join('L')+'Z';}
document.getElementById('m').innerHTML='<svg viewBox="0 0 512 512"><path d="'+rib(false)+
'" fill="#C89B3C"/><path d="'+rib(true)+'" fill="#C89B3C"/><path d="M228 158L284 158L279 296L256 414L233 296L228 158Z" fill="#C89B3C"/></svg>';
</script>
</body></html>
